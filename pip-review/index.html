<h2 class="post-title"><a href="https:&#x2F;&#x2F;nbari.com&#x2F;pip-review&#x2F;">pip-review</a></h2>
<div class="post-header">
    <span class="post-date">November 16, 2024</span>
    
</div>

    <div class="post-content">
        <p>To upgrade all packages installed with pip:</p>
<pre class="giallo" style="color: #BABED8; background-color: #0F111A;"><code data-lang="shellscript"><span class="giallo-l"><span style="color: #FFCB6B;">pip</span><span style="color: #C3E88D;"> install pip-review</span></span></code></pre>
<p>Then run:</p>
<pre class="giallo" style="color: #BABED8; background-color: #0F111A;"><code data-lang="shellscript"><span class="giallo-l"><span style="color: #FFCB6B;">pip-review</span><span style="color: #C3E88D;"> --auto</span></span></code></pre>
<p>As an alternative, you can use:</p>
<pre class="giallo" style="color: #BABED8; background-color: #0F111A;"><code data-lang="shellscript"><span class="giallo-l"><span style="color: #FFCB6B;">pip</span><span style="color: #C3E88D;"> list --outdated</span><span style="color: #89DDFF;"> |</span><span style="color: #FFCB6B;"> awk</span><span style="color: #89DDFF;"> &#39;</span><span style="color: #C3E88D;">NR &gt; 2 {print $1}</span><span style="color: #89DDFF;">&#39; |</span><span style="color: #FFCB6B;"> xargs</span><span style="color: #C3E88D;"> -n1 pip install --upgrade</span></span></code></pre>
    </div>
