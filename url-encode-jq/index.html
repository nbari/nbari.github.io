    <div class="post-content">
        <p>When using pgcli and if want to use -D &lt;alias_dsn&gt; if your password is using special characters, you can use jq to URL encode the password.</p>
<pre class="giallo" style="color: #BABED8; background-color: #0F111A;"><code data-lang="shellscript"><span class="giallo-l"><span style="color: #82AAFF;">echo</span><span style="color: #C3E88D;"> -n</span><span style="color: #89DDFF;"> &#39;</span><span style="color: #C3E88D;">My@Secure:Pa$$word</span><span style="color: #89DDFF;">&#39; |</span><span style="color: #FFCB6B;"> jq</span><span style="color: #C3E88D;"> -Rr @uri</span></span></code></pre>
