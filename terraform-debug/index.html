    <div class="post-content">
        <p>Debug terraform settings this variables:</p>
<pre class="giallo" style="color: #BABED8; background-color: #0F111A;"><code data-lang="shellscript"><span class="giallo-l"><span style="color: #C792EA;">export</span><span> TF_LOG_PATH</span><span style="color: #89DDFF;">=&quot;</span><span style="color: #C3E88D;">/tmp/terraform.log</span><span style="color: #89DDFF;">&quot;</span></span>
<span class="giallo-l"><span style="color: #C792EA;">export</span><span> TF_LOG</span><span style="color: #89DDFF;">=&quot;</span><span style="color: #C3E88D;">DEBUG</span><span style="color: #89DDFF;">&quot;</span></span></code></pre>
<p>Then run terraform as always:</p>
<pre class="giallo" style="color: #BABED8; background-color: #0F111A;"><code data-lang="plain"><span class="giallo-l"><span>$ terraform plan ...</span></span></code></pre>
